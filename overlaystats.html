<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info Box</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: transparent !important;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .card {
      background: rgba(22, 24, 28, 0.88);
      border-radius: 40px;
      border: 2px solid #D4A017;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      gap: 10px;
    }
    .value {
      font-size: 42px;
      font-weight: 900;
      color: #F0F3F8;
      letter-spacing: -1px;
      line-height: 1;
      white-space: nowrap;
    }
    .value.temp  { color: #3B6CFF; }
    .value.speed { color: #2ECC71; }
    .stat-icon {
      width: 56px; height: 56px;
      background: #0E1013;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .stat-icon img { width: 34px; height: 34px; object-fit: cover; border-radius: 4px; }
    .stat-icon span { font-size: 32px; line-height: 1; }
    .city-wrap { width: 140px; overflow: hidden; }
    .value.city { font-size: 32px; letter-spacing: -0.5px; display: inline-block; }
    .value.city.scrolling { animation: cityScroll 9s ease-in-out infinite; }
    @keyframes cityScroll {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(0); }
      60%  { transform: translateX(-100%); }
      75%  { transform: translateX(-100%); }
      76%  { transform: translateX(140px); }
      100% { transform: translateX(0); }
    }
    .divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
  </style>
<base target="_blank">
</head>
<body>
<div class="card">
  <div class="item">
    <div class="stat-icon"><img src="https://cdn.streamelements.com/uploads/01ks5arpdstgph8e6nx10sgtte.webp" alt="PT" style="width:34px;height:34px;object-fit:cover;border-radius:4px;"></div>
    <div class="city-wrap"><span class="value city" id="cityVal">A localizar...</span></div>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="stat-icon"><span id="weatherIcon">☀️</span></div>
    <span class="value temp" id="tempVal">--°</span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="stat-icon"><img src="https://cdn.streamelements.com/uploads/01ks5bxa91235dtpmjn10zhcxa.webp" alt="clock" style="width:34px;height:34px;object-fit:cover;border-radius:4px;"></div>
    <span class="value" id="timeVal">--:--</span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="stat-icon"><img src="https://cdn.streamelements.com/uploads/01ks5bv0qze4q8qj6rfnz9p02p.webp" alt="speed" style="width:34px;height:34px;object-fit:cover;border-radius:4px;"></div>
    <span class="value speed" id="speedVal">0 km/h</span>
  </div>
</div>
<script>
  function updateClock() {
    const now = new Date();
    document.getElementById('timeVal').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  setInterval(updateClock, 1000);
  updateClock();

  let lastCity = 0;
  let lastWeather = 0;

  async function fetchCity(lat, lng) {
    if (Date.now() - lastCity < 30000) return;
    lastCity = Date.now();
    try {
      const res = await fetch(
        'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json'
      );
      const d = await res.json();
      const city = d.address?.city || d.address?.town || d.address?.village || d.address?.suburb || '--';
      const el = document.getElementById('cityVal');
      el.textContent = city;
      el.classList.remove('scrolling');
      setTimeout(() => {
        if (el.scrollWidth > 140) el.classList.add('scrolling');
      }, 50);
    } catch(e) {}
  }

  function getWeatherEmoji(code, isDay) {
    const c = Number(code);
    const day = isDay === 1;

    // 0 = céu limpo
    if (c === 0) return day ? '☀️' : '🌙';
    // 1 = maioritariamente limpo
    if (c === 1) return day ? '🌤️' : '🌙';
    // 2 = parcialmente nublado
    if (c === 2) return day ? '⛅' : '🌑';
    // 3 = nublado (CORRIGIDO: agora distingue dia/noite)
    if (c === 3) return day ? '☁️' : '☁️🌑';
    // nevoeiro
    if (c === 45 || c === 48) return day ? '🌫️' : '🌫️';
    // chuvisco leve/moderado
    if (c >= 51 && c <= 55) return day ? '🌦️' : '🌧️';
    // chuvisco gelado
    if (c === 56 || c === 57) return '🌨️';
    // chuva leve/moderada
    if (c >= 61 && c <= 63) return day ? '🌦️' : '🌧️';
    // chuva intensa
    if (c >= 64 && c <= 65) return '🌧️';
    // chuva gelada
    if (c === 66 || c === 67) return '🌨️';
    // neve
    if (c >= 71 && c <= 77) return '❄️';
    // aguaceiros
    if (c >= 80 && c <= 82) return day ? '🌦️' : '🌧️';
    // aguaceiros de neve
    if (c === 85 || c === 86) return '🌨️';
    // trovoada
    if (c >= 95 && c <= 99) return '⛈️';

    return day ? '☀️' : '🌙';
  }

  async function fetchWeather(lat, lng) {
    if (Date.now() - lastWeather < 300000) return;
    lastWeather = Date.now();
    try {
      const res = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
        '&current=temperature_2m,weather_code,is_day&timezone=auto'
      );
      const d = await res.json();
      const temp = Math.round(Number(d.current?.temperature_2m) || 0);
      const code = Number(d.current?.weather_code) || 0;
      const isDay = d.current?.is_day ?? 0;
      document.getElementById('tempVal').textContent = isNaN(temp) ? '--°' : temp + '°';
      document.getElementById('weatherIcon').textContent = getWeatherEmoji(code, isDay);
    } catch(e) {}
  }

  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const speed = pos.coords.speed;
        const kmh = (speed != null && speed >= 0) ? Math.round(speed * 3.6) : 0;
        document.getElementById('speedVal').textContent = kmh + ' km/h';
        fetchCity(lat, lng);
        fetchWeather(lat, lng);
      },
      (err) => {
        document.getElementById('cityVal').textContent = 'Sem GPS';
      },
      { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
    );
  } else {
    document.getElementById('cityVal').textContent = 'GPS indisponível';
  }
</script>
</body>
</html>
