<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GPS Overlay - Mapa Noturno</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
}

#nav-widget{
    width:550px;
    border-radius:20px;
    overflow:hidden;
    background:#0a0c10;
    /* Apenas contorno amarelo, sem brilho/sombra */
    border:2px solid #D4A017;
    box-shadow: none;
}

#map-container{
    position:relative;
    width:100%;
    height:340px;
    background:#0a0c10;
}

#map{
    width:100%;
    height:100%;
    background:#0a0c10 !important;
}

/* FILTRO QUE DEIXA AS LOJAS E PONTOS VISÍVEIS (MODO NOTURNO) */
.leaflet-tile {
    filter: invert(100%) brightness(0.85) contrast(1.1) hue-rotate(180deg) !important;
}

.leaflet-container {
    background: #0a0c10 !important;
}

.leaflet-control-container{
    display:none;
}

.leaflet-map-pane {
    z-index: 1;
}

/* SETA COMPLETAMENTE REMOVIDA */
#player{
    display: none;
}

#player::after{
    display: none;
}

#street-name{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
    padding:8px 16px;
    background:rgba(0,0,0,.8);
    border:1px solid rgba(255,215,0,.5);
    border-radius:12px;
    color:#fff;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    backdrop-filter:blur(10px);
    font-family:'Inter',sans-serif;
}
</style>
</head>

<body>

<div id="nav-widget">
    <div id="map-container">
        <div id="map"></div>

        <!-- Seta removida - elemento oculto -->
        <div id="player" style="display:none;">
            <img src="https://cdn.streamelements.com/uploads/01kta3dvyge4kbe0jrrwkg3g4p.webp">
        </div>

        <div id="street-name">
            A obter localização...
        </div>
    </div>
</div>

<script>

const ZOOM = 18;

const map = L.map('map',{
    zoomControl:false,
    attributionControl:false,
    dragging:false,
    scrollWheelZoom:false,
    doubleClickZoom:false,
    touchZoom:false,
    keyboard:false,
    zoomAnimation:true,
    fadeAnimation:true
});

// Usando OpenStreetMap normal + filtro CSS para efeito noturno
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20,
    minZoom: 14,
    attribution: ''
}).addTo(map);

map.setView([38.7169,-9.1395],ZOOM);

let lastLat = null;
let lastLng = null;

async function updateStreet(lat,lng){
    try{
        const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`
        );
        const data = await response.json();
        const road =
            data.address.road ||
            data.address.pedestrian ||
            data.address.suburb ||
            data.address.shop ||
            data.address.amenity ||
            "Localização desconhecida";
        document.getElementById("street-name").innerText = road;
    }catch{
        document.getElementById("street-name").innerText = "Sem informação";
    }
}

if(navigator.geolocation){
    navigator.geolocation.watchPosition(
        pos=>{
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            if(
                lastLat &&
                Math.abs(lastLat-lat) < 0.000005 &&
                Math.abs(lastLng-lng) < 0.000005
            ){
                return;
            }
            lastLat = lat;
            lastLng = lng;
            map.setView(
                [lat,lng],
                ZOOM,
                {
                    animate:true,
                    duration:0.65,
                    easeLinearity:0.3
                }
            );
            updateStreet(lat,lng);
        },
        err=>{
            console.log("Erro de geolocalização:", err);
            document.getElementById("street-name").innerText = 
                "Ative a localização";
        },
        {
            enableHighAccuracy:true,
            maximumAge:2000,
            timeout:15000
        }
    );
    
    // Tentativa inicial imediata
    navigator.geolocation.getCurrentPosition(pos => {
        if (!lastLat) {
            lastLat = pos.coords.latitude;
            lastLng = pos.coords.longitude;
            map.setView([lastLat, lastLng], ZOOM, { animate: true, duration: 0.5 });
            updateStreet(lastLat, lastLng);
        }
    }, () => {}, { enableHighAccuracy: true, timeout: 5000 });
} else {
    document.getElementById("street-name").innerText = 
        "Navegador não suporta GPS";
}

window.addEventListener("resize",()=>{
    setTimeout(() => {
        map.invalidateSize({ animate: false });
        if (lastLat && lastLng) {
            map.setView([lastLat, lastLng], ZOOM, { animate: false });
        }
    }, 100);
});

window.addEventListener("load", () => {
    map.invalidateSize({ animate: false });
});

</script>

</body>
</html>
